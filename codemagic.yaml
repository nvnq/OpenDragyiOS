workflows:
  ios-native-workflow:
    name: Native iOS Swift Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        PROJECT_DIR: "iOS" 
        XCODE_PROJECT: "iOS.xcodeproj"          
        XCODE_SCHEME: "DIYDragy - iOS"  # Hardcoded exact name with spaces intact
      xcode: latest
    scripts:
      - name: Recreate and Share Xcode Schemes
        script: |
          cd "$PROJECT_DIR"
          
          # Force the scheme files to be generated globally so the build system can read them
          gem install xcodeproj
          ruby -e "require 'xcodeproj'; proj = Xcodeproj::Project.open('$XCODE_PROJECT'); proj.recreate_user_schemes; proj.save"

      - name: Build Swift App
        script: |
          cd "$PROJECT_DIR"
          
          echo "Building with scheme: $XCODE_SCHEME"
          
          # Clean old artifacts
          xcodebuild clean -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
          
          # Compile the application (wrapped in quotes to handle spaces)
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
            
      - name: Packaging as Unsigned IPA
        script: |
          cd "$PROJECT_DIR"
          mkdir -p Payload
          
          # Copy the built app binary
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
          
          # Package into the final zip format
          zip -r ../OpenDragy.ipa Payload
          rm -rf Payload
    artifacts:
      - "*.ipa"
