workflows:
  ios-native-workflow:
    name: Native iOS Swift Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "YourAppName.xcodeproj" # Change this to match your file name
        XCODE_SCHEME: "YourAppName"            # Change this to match your scheme name
      xcode: latest
    scripts:
      - name: Build Swift App
        script: |
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO
      - name: Packaging as Unsigned IPA
        script: |
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
          zip -r YourAppName.ipa Payload
          rm -rf Payload
    artifacts:
      - "*.ipa"
