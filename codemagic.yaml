workflows:
  ios-native-workflow:
    name: Native iOS Swift Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        PROJECT_DIR: "iOS" 
        XCODE_PROJECT: "iOS.xcodeproj"          
      xcode: latest
    scripts:
      - name: Build Swift App
        script: |
          cd "$PROJECT_DIR"
          
          # Dynamically find the first valid scheme in the project
          echo "Finding project schemes..."
          XCODE_SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' | xargs | awk '{print $1}')
          
          if [ -z "$XCODE_SCHEME" ]; then
            echo "Error: No Xcode scheme found!"
            exit 1
          fi
          
          echo "Found scheme: $XCODE_SCHEME"
          
          # Clean any old build artifacts
          xcodebuild clean -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
          
          # Build the binaries without requiring developer signing keys
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
            
      - name: Packaging as Unsigned IPA
        script: |
          cd "$PROJECT_DIR"
          mkdir -p Payload
          
          # Copy the compiled .app file
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
          
          # Zip it up into an installer format
          zip -r ../OpenDragy.ipa Payload
          rm -rf Payload
    artifacts:
      - "*.ipa"
