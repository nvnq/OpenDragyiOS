workflows:
  ios-native-workflow:
    name: Native iOS Swift Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        PROJECT_DIR: "iOS" 
        XCODE_PROJECT: "iOS.xcodeproj" 
        XCODE_SCHEME: "iOS"            
      xcode: latest
    scripts:
      - name: Build Swift App
        script: |
          # Navigate into the iOS folder where the project lives
          cd "$PROJECT_DIR"
          
          # Clean any old build artifacts first
          xcodebuild clean -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
          
          # Build the binaries without requiring Apple developer signing keys
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
            
      - name: Packaging as Unsigned IPA
        script: |
          cd "$PROJECT_DIR"
          mkdir -p Payload
          
          # Find the compiled .app file from Xcode's default build directory and copy it
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
          
          # Zip it up into an installer format and move it out to the root directory
          zip -r ../OpenDragy.ipa Payload
          rm -rf Payload
    artifacts:
      - "*.ipa"
