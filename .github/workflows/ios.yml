name: Build DIYDragy iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Show repository structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type d | sort

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Verify workspace
        run: |
          test -f DIYDragy.xcworkspace/contents.xcworkspacedata
          test -d Framework
          test -d iOS

      - name: List schemes
        run: |
          xcodebuild \
            -workspace DIYDragy.xcworkspace \
            -list

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -workspace DIYDragy.xcworkspace \
            -scheme "DIYDragy - iOS"

      - name: Build
        run: |
          xcodebuild \
            -workspace DIYDragy.xcworkspace \
            -scheme "DIYDragy - iOS" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Locate built app
        run: |
          find ~/Library/Developer/Xcode/DerivedData -name "*.app"

      - name: Create IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          mkdir Payload
          cp -R "$APP" Payload/

          zip -r DIYDragy.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DIYDragy-IPA
          path: DIYDragy.ipa
