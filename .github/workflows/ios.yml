name: Compile Swift to IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies and Compile
      run: |
        cd iOS
        
        # 1. Resolve Swift Package Manager dependencies if used
        xcodebuild -resolvePackageDependencies -project iOS.xcodeproj
        
        # 2. If using CocoaPods, install pods (uncomment the 2 lines below if a Podfile exists)
        # pod repo update
        # pod install
        
        # 3. Clean the project
        xcodebuild clean -project iOS.xcodeproj -scheme "DIYDragy - iOS"
        
        # 4. Build the binaries bypassing code signing limits
        xcodebuild build-for-testing \
          -project iOS.xcodeproj \
          -scheme "DIYDragy - iOS" \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO
          
        # 5. Structure into a Payload ZIP
        mkdir -p Payload
        cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
        zip -r ../DIYDragy.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-iOS-App
        path: DIYDragy.ipa
