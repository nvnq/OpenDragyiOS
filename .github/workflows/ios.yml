name: Compile Swift to IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Compile Project and Package Unsigned IPA
      run: |
        cd iOS
        
        # 1. Clean the project
        xcodebuild clean -project iOS.xcodeproj -scheme "DIYDragy - iOS"
        
        # 2. Build the main application binary directly while overriding code signing
        xcodebuild build \
          -project iOS.xcodeproj \
          -scheme "DIYDragy - iOS" \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          COMPILER_INDEX_STORE_ENABLE=NO
          
        # 3. Create the standard Payload structure required for an .ipa package
        mkdir -p Payload
        
        # 4. Copy the freshly compiled app binary into the Payload directory
        cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Debug-iphoneos/*.app Payload/
        
        # 5. Compress the folder into your final installable iOS file
        zip -r ../DIYDragy.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-iOS-App
        path: DIYDragy.ipa
